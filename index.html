<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="rmnlogo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راديو مريم الناصرة - الجدول</title>
    <style>
        :root { 
            --primary-blue: #0288d1; 
            --light-blue-bg: #e1f5fe; 
            --header-blue: #b3e5fc;
            --border-blue: #81d4fa;
            --text-main: #263238;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f7fa; color: var(--text-main); margin: 0; padding: 15px; }
        .logo-area { text-align: center; padding: 15px; background: white; margin-bottom: 20px; border-radius: 15px; border-bottom: 4px solid var(--primary-blue); }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); overflow-x: auto; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1000px; border: 1px solid var(--border-blue); border-radius: 8px; overflow: hidden; }
        th, td { border: 0.5px solid var(--border-blue); padding: 12px; text-align: center; vertical-align: middle; }
        th { background: var(--header-blue); color: #01579b; font-weight: bold; font-size: 0.95em; }
        
        .section-title { background: #f1f8ff; width: 180px; font-weight: 700; color: var(--primary-blue); border-left: 2px solid var(--primary-blue); position: relative; }
        .delete-row { color: #d32f2f; cursor: pointer; font-size: 0.8em; margin-right: 8px; visibility: hidden; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); }
        .section-title:hover .delete-row { visibility: visible; }

        .editable { background: white; min-height: 70px; outline: none; font-size: 1.1em; transition: all 0.2s; }
        .editable:focus { background: var(--light-blue-bg); }
        
        .week-divider { border-right: 4px solid var(--primary-blue) !important; }
        .today-highlight { background: #fffde7 !important; border: 2px solid #fbc02d !important; color: #f57f17; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; gap: 10px; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: white; font-size: 1em; }
        .btn-save { background: var(--primary-blue); }
        .btn-add { background: #4caf50; }
        #status { font-style: italic; color: #78909c; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="logo-area">
    <img src="rmnlogo.png" style="width: 150px; height: auto;" alt="Radio Maria Nazareth Logo"/>
</div>

<div class="container">
    <div class="controls">
        <div id="status">جاري التحميل...</div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-add" onclick="addNewProgram()">➕ برنامج جديد</button>
            <button class="btn btn-save" onclick="saveData()">💾 حفظ التعديلات</button>
        </div>
    </div>

    <table id="scheduleTable">
        <thead>
            <tr id="dayNames"><th class="section-title">اليوم</th></tr>
            <tr id="dateRow"><th class="section-title">التاريخ</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const BIN_ID = '69ca3a33856a682189dff87a'; 
    const API_KEY = '$2a$10$QIQ1Ipa0xdzeDZtiaDYR6.RdJxqBfD5tFC0TNrp8Xr3xTTixgWSrO';
    const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    
    // Cleaned default: No more "ref" or "ver"
    let scheduleData = { 
        programs: ["تأملات مسيحية", "آية اليوم", "قديسي الأسبوع"], 
        data: {} 
    };
    const dayNamesAr = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];

    async function loadData() {
        try {
            const res = await fetch(`${URL}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            const json = await res.json();
            
            if (json.record.programs && json.record.data) {
                scheduleData = json.record;
            } else {
                scheduleData.data = json.record;
            }

            cleanOldData(); 
            renderTable();
            document.getElementById('status').innerText = "تم التحديث ✅";
        } catch (e) {
            document.getElementById('status').innerText = "خطأ في الاتصال";
        }
    }

    async function saveData() {
        document.getElementById('status').innerText = "جاري الحفظ...";
        try {
            await fetch(URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(scheduleData)
            });
            document.getElementById('status').innerText = "تم الحفظ ✅";
            alert("تم حفظ التعديلات بنجاح! 💾✨"); // Added alert with emoji
        } catch (e) {
            alert("فشل الحفظ.");
        }
    }

    function cleanOldData() {
        const today = new Date().toISOString().split('T')[0];
        let needsSync = false;
        
        Object.keys(scheduleData.data).forEach(dateKey => {
            if (dateKey < today) { 
                delete scheduleData.data[dateKey]; 
                needsSync = true; 
            }
        });
        
        if (needsSync) saveData();
    }

    function addNewProgram() {
        const name = prompt("أدخل اسم البرنامج الجديد:");
        if (name && !scheduleData.programs.includes(name)) {
            scheduleData.programs.push(name);
            renderTable();
        }
    }

    function removeProgram(name) {
        if(confirm(`هل تريد حذف برنامج ${name} نهائياً؟`)) {
            scheduleData.programs = scheduleData.programs.filter(p => p !== name);
            renderTable();
        }
    }

    function renderTable() {
        const dayRow = document.getElementById('dayNames');
        const dateRow = document.getElementById('dateRow');
        const body = document.getElementById('tableBody');

        dayRow.innerHTML = '<th class="section-title">اليوم</th>';
        dateRow.innerHTML = '<th class="section-title">التاريخ</th>';
        body.innerHTML = '';

        let now = new Date();
        // Logic starts from current Monday
        let start = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));

        let dates = [];
        for (let i = 0; i < 14; i++) {
            let curr = new Date(start);
            curr.setDate(start.getDate() + i);
            let dStr = curr.toISOString().split('T')[0];
            dates.push({ 
                str: dStr, 
                isToday: new Date().toISOString().split('T')[0] === dStr, 
                isDiv: (i === 7), 
                day: dayNamesAr[curr.getDay()], 
                label: curr.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit'}) 
            });
            
            const thD = document.createElement('th');
            thD.innerText = dates[i].day;
            if(dates[i].isDiv) thD.classList.add('week-divider');
            if(dates[i].isToday) thD.classList.add('today-highlight');
            dayRow.appendChild(thD);

            const thT = document.createElement('th');
            thT.innerText = dates[i].label;
            if(dates[i].isDiv) thT.classList.add('week-divider');
            dateRow.appendChild(thT);
        }

        scheduleData.programs.forEach(prog => {
            const tr = document.createElement('tr');
            const titleTd = document.createElement('td');
            titleTd.className = 'section-title';
            titleTd.innerHTML = `${prog} <span class="delete-row" onclick="removeProgram('${prog}')">✖</span>`;
            tr.appendChild(titleTd);

            dates.forEach(d => {
                const td = document.createElement('td');
                td.className = 'editable';
                td.contentEditable = true;
                if(d.isDiv) td.classList.add('week-divider');
                if(d.isToday) td.classList.add('today-highlight');
                
                // Matches input directly to the program name
                td.innerText = scheduleData.data[d.str]?.[prog] || "";
                
                td.oninput = () => {
                    if(!scheduleData.data[d.str]) scheduleData.data[d.str] = {};
                    scheduleData.data[d.str][prog] = td.innerText;
                };
                tr.appendChild(td);
            });
            body.appendChild(tr);
        });
    }

    loadData();
</script>
</body>
</html>
